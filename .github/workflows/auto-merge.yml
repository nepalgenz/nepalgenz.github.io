name: Auto-merge PRs from gaaarima

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'gaaarima'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Auto-merge PR
        uses: pascalgn/automerge-action@v0.16.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_COMMIT_MESSAGE: pull-request-title
          MERGE_LABELS: ""
          MERGE_REMOVE_LABELS: ""
          MERGE_FORKS: "true"
          UPDATE_METHOD: rebase
